<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Free Account</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0a15 0%, #2d1218 30%, #0a0505 60%, #1a0a10 100%);
      position: relative;
    }

    .main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 80%;
      gap: 40px;
    }

    .container {
      position: relative;
      width: 420px;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .container h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 40px;
    }

    .input-group {
      position: relative;
      margin-bottom: 30px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      outline: none;
      border-radius: 35px;
      font-size: 16px;
      color: #fff;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .input-group input:focus + label,
    .input-group input:valid + label {
      top: 0;
      left: 15px;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 8px;
      border-radius: 10px;
      color: #fff;
    }

    

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

  .remember-forgot a {
    color: #fff;
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .remember-forgot a:hover {
    text-decoration: underline;
  }


    .login-btn {
      width: 100%;
      padding: 15px 35px;
      background-color: #ff6b35;
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      background-color: #b22222;
      transform: translateY(-2px);
    }

    .register {
      text-align: center;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
/*login small*/
    .register a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
    }

    .register a:hover{
    text-decoration: underline;
    }

    .img img {
      width: 500px;
      height: auto;
      border-radius: 30px;
      animation: floatImage 2.5s ease-in-out infinite;
    }

    @keyframes floatImage {
      0%, 100% { transform: translateY(35px); }
      50% { transform: translateY(-20px); }
    }

    @media screen and (max-width: 768px) {
      .main {
        flex-direction: column-reverse;
        gap: 30px;
      }

      .img img {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="main">
    
    <div class="container">
      <h1>Create Free Account</h1>
      <form action="index.html" method="get">
        <div class="input-group">
          <input type="email" id="email" name="email"  required />
          <label for="email">Email</label>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password"  required minlength="6" />
          <label for="password">Password</label>
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Register</button>

        <div class="register">
          Already have an account? <a href="/sign in page/Login.html">Login</a>
        </div>
      </form>
    </div>

    
    <div class="img">
            <img src="images/coffee-hero-section.png" alt="">
        </div>
  </div>
</body>
</html>
